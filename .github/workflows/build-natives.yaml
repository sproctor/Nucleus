name: Build Native Libraries

on:
  workflow_call:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build darkmode-detector Windows native DLLs
        shell: cmd
        run: call darkmode-detector\src\main\native\windows\build.bat

      - name: Verify darkmode-detector Windows natives
        shell: bash
        run: |
          for f in \
            darkmode-detector/src/main/resources/nucleus/native/win32-x64/nucleus_windows_theme.dll \
            darkmode-detector/src/main/resources/nucleus/native/win32-aarch64/nucleus_windows_theme.dll; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload darkmode-detector Windows DLLs
        uses: actions/upload-artifact@v4
        with:
          name: windows-natives
          path: darkmode-detector/src/main/resources/nucleus/native/win32-*/
          retention-days: 1

      - name: Build native-ssl Windows DLLs
        shell: cmd
        run: call native-ssl\src\main\native\windows\build.bat

      - name: Verify native-ssl Windows natives
        shell: bash
        run: |
          for f in \
            native-ssl/src/main/resources/nucleus/native/win32-x64/nucleus_ssl.dll \
            native-ssl/src/main/resources/nucleus/native/win32-aarch64/nucleus_ssl.dll; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload native-ssl Windows DLLs
        uses: actions/upload-artifact@v4
        with:
          name: ssl-windows
          path: native-ssl/src/main/resources/nucleus/native/win32-*/
          retention-days: 1

      - name: Build decorated-window-jni Windows DLLs
        shell: cmd
        run: call decorated-window-jni\src\main\native\windows\build.bat

      - name: Verify decorated-window-jni Windows natives
        shell: bash
        run: |
          for f in \
            decorated-window-jni/src/main/resources/nucleus/native/win32-x64/nucleus_windows_decoration.dll \
            decorated-window-jni/src/main/resources/nucleus/native/win32-aarch64/nucleus_windows_decoration.dll; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload decorated-window-jni Windows DLLs
        uses: actions/upload-artifact@v4
        with:
          name: decorated-window-jni-windows
          path: decorated-window-jni/src/main/resources/nucleus/native/win32-*/
          retention-days: 1

      - name: Build system-color Windows DLLs
        shell: cmd
        run: call system-color\src\main\native\windows\build.bat

      - name: Verify system-color Windows natives
        shell: bash
        run: |
          for f in \
            system-color/src/main/resources/nucleus/native/win32-x64/nucleus_systemcolor.dll \
            system-color/src/main/resources/nucleus/native/win32-aarch64/nucleus_systemcolor.dll; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload system-color Windows DLLs
        uses: actions/upload-artifact@v4
        with:
          name: system-color-windows
          path: system-color/src/main/resources/nucleus/native/win32-*/
          retention-days: 1

      - name: Build energy-manager Windows DLLs
        shell: cmd
        run: call energy-manager\src\main\native\windows\build.bat

      - name: Verify energy-manager Windows natives
        shell: bash
        run: |
          for f in \
            energy-manager/src/main/resources/nucleus/native/win32-x64/nucleus_energy_manager.dll \
            energy-manager/src/main/resources/nucleus/native/win32-aarch64/nucleus_energy_manager.dll; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload energy-manager Windows DLLs
        uses: actions/upload-artifact@v4
        with:
          name: energy-manager-windows
          path: energy-manager/src/main/resources/nucleus/native/win32-*/
          retention-days: 1

  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build darkmode-detector macOS native dylibs
        run: bash darkmode-detector/src/main/native/macos/build.sh

      - name: Verify darkmode-detector macOS natives
        run: |
          for f in \
            darkmode-detector/src/main/resources/nucleus/native/darwin-aarch64/libnucleus_darkmode.dylib \
            darkmode-detector/src/main/resources/nucleus/native/darwin-x64/libnucleus_darkmode.dylib; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload darkmode-detector macOS dylibs
        uses: actions/upload-artifact@v4
        with:
          name: macos-natives
          path: darkmode-detector/src/main/resources/nucleus/native/darwin-*/
          retention-days: 1

      - name: Build native-ssl macOS dylibs
        run: bash native-ssl/src/main/native/macos/build.sh

      - name: Verify native-ssl macOS natives
        run: |
          for f in \
            native-ssl/src/main/resources/nucleus/native/darwin-aarch64/libnucleus_ssl.dylib \
            native-ssl/src/main/resources/nucleus/native/darwin-x64/libnucleus_ssl.dylib; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload native-ssl macOS dylibs
        uses: actions/upload-artifact@v4
        with:
          name: ssl-macos
          path: native-ssl/src/main/resources/nucleus/native/darwin-*/
          retention-days: 1

      - name: Build decorated-window-jbr macOS dylibs
        run: bash decorated-window-jbr/src/main/native/macos/build.sh

      - name: Verify decorated-window-jbr macOS natives
        run: |
          for f in \
            decorated-window-jbr/src/main/resources/nucleus/native/darwin-aarch64/libnucleus_macos.dylib \
            decorated-window-jbr/src/main/resources/nucleus/native/darwin-x64/libnucleus_macos.dylib; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload decorated-window-jbr macOS dylibs
        uses: actions/upload-artifact@v4
        with:
          name: decorated-window-jbr-macos
          path: decorated-window-jbr/src/main/resources/nucleus/native/darwin-*/
          retention-days: 1

      - name: Build decorated-window-jni macOS dylibs
        run: bash decorated-window-jni/src/main/native/macos/build.sh

      - name: Verify decorated-window-jni macOS natives
        run: |
          for f in \
            decorated-window-jni/src/main/resources/nucleus/native/darwin-aarch64/libnucleus_macos_jni.dylib \
            decorated-window-jni/src/main/resources/nucleus/native/darwin-x64/libnucleus_macos_jni.dylib; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload decorated-window-jni macOS dylibs
        uses: actions/upload-artifact@v4
        with:
          name: decorated-window-jni-macos
          path: decorated-window-jni/src/main/resources/nucleus/native/darwin-*/
          retention-days: 1

      - name: Build system-color macOS dylibs
        run: bash system-color/src/main/native/macos/build.sh

      - name: Verify system-color macOS natives
        run: |
          for f in \
            system-color/src/main/resources/nucleus/native/darwin-aarch64/libnucleus_systemcolor.dylib \
            system-color/src/main/resources/nucleus/native/darwin-x64/libnucleus_systemcolor.dylib; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload system-color macOS dylibs
        uses: actions/upload-artifact@v4
        with:
          name: system-color-macos
          path: system-color/src/main/resources/nucleus/native/darwin-*/
          retention-days: 1

      - name: Build energy-manager macOS dylibs
        run: bash energy-manager/src/main/native/macos/build.sh

      - name: Verify energy-manager macOS natives
        run: |
          for f in \
            energy-manager/src/main/resources/nucleus/native/darwin-aarch64/libnucleus_energy_manager.dylib \
            energy-manager/src/main/resources/nucleus/native/darwin-x64/libnucleus_energy_manager.dylib; do
            if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      - name: Upload energy-manager macOS dylibs
        uses: actions/upload-artifact@v4
        with:
          name: energy-manager-macos
          path: energy-manager/src/main/resources/nucleus/native/darwin-*/
          retention-days: 1

  linux:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libx11-dev

      - name: Build darkmode-detector Linux native shared library
        run: bash darkmode-detector/src/main/native/linux/build.sh

      - name: Verify darkmode-detector Linux native
        run: |
          f="darkmode-detector/src/main/resources/nucleus/native/linux-${{ matrix.arch }}/libnucleus_linux_theme.so"
          if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
          echo "OK: $f ($(wc -c < "$f") bytes)"

      - name: Upload darkmode-detector Linux shared library
        uses: actions/upload-artifact@v4
        with:
          name: linux-natives-${{ matrix.arch }}
          path: darkmode-detector/src/main/resources/nucleus/native/linux-*/
          retention-days: 1

      - name: Build decorated-window-jni Linux native shared library
        run: bash decorated-window-jni/src/main/native/linux/build.sh

      - name: Verify decorated-window-jni Linux native
        run: |
          f="decorated-window-jni/src/main/resources/nucleus/native/linux-${{ matrix.arch }}/libnucleus_linux_jni.so"
          if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
          echo "OK: $f ($(wc -c < "$f") bytes)"

      - name: Upload decorated-window-jni Linux shared library
        uses: actions/upload-artifact@v4
        with:
          name: decorated-window-jni-linux-${{ matrix.arch }}
          path: decorated-window-jni/src/main/resources/nucleus/native/linux-*/
          retention-days: 1

      - name: Build linux-hidpi native shared library
        run: bash linux-hidpi/src/main/native/linux/build.sh

      - name: Verify linux-hidpi native
        run: |
          f="linux-hidpi/src/main/resources/nucleus/native/linux-${{ matrix.arch }}/libnucleus_linux_hidpi_jni.so"
          if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
          echo "OK: $f ($(wc -c < "$f") bytes)"

      - name: Upload linux-hidpi shared library
        uses: actions/upload-artifact@v4
        with:
          name: linux-hidpi-${{ matrix.arch }}
          path: linux-hidpi/src/main/resources/nucleus/native/linux-*/
          retention-days: 1

      - name: Build system-color Linux native shared library
        run: bash system-color/src/main/native/linux/build.sh

      - name: Verify system-color Linux native
        run: |
          f="system-color/src/main/resources/nucleus/native/linux-${{ matrix.arch }}/libnucleus_systemcolor.so"
          if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
          echo "OK: $f ($(wc -c < "$f") bytes)"

      - name: Upload system-color Linux shared library
        uses: actions/upload-artifact@v4
        with:
          name: system-color-linux-${{ matrix.arch }}
          path: system-color/src/main/resources/nucleus/native/linux-*/
          retention-days: 1

      - name: Build energy-manager Linux native shared library
        run: bash energy-manager/src/main/native/linux/build.sh

      - name: Verify energy-manager Linux native
        run: |
          f="energy-manager/src/main/resources/nucleus/native/linux-${{ matrix.arch }}/libnucleus_energy_manager.so"
          if [ ! -f "$f" ]; then echo "MISSING: $f" >&2; exit 1; fi
          echo "OK: $f ($(wc -c < "$f") bytes)"

      - name: Upload energy-manager Linux shared library
        uses: actions/upload-artifact@v4
        with:
          name: energy-manager-linux-${{ matrix.arch }}
          path: energy-manager/src/main/resources/nucleus/native/linux-*/
          retention-days: 1
