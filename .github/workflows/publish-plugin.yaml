name: Publish Plugin to Portal

on:
  push:
    tags:
      - '*'

jobs:
  build-natives:
    uses: ./.github/workflows/build-natives.yaml

  gradle:
    needs: build-natives
    runs-on: ubuntu-latest
    env:
      GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
      GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
      # Override to publish the plugin under your own namespace. PUBLISH_GROUP sets the
      # Maven group of the plugin artifact; PUBLISH_PLUGIN_ID sets the (globally unique)
      # Gradle Plugin Portal id. Both default to the canonical values, so upstream is
      # unaffected. Set them as repository variables to enable a parallel publication.
      ORG_GRADLE_PROJECT_GROUP: ${{ vars.PUBLISH_GROUP || 'io.github.kdroidfilter' }}
      ORG_GRADLE_PROJECT_ID: ${{ vars.PUBLISH_PLUGIN_ID || 'io.github.kdroidfilter.nucleus' }}
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libdbus-1-dev libglib2.0-dev

      - name: Download native artifacts
        uses: ./.github/actions/download-natives

      - name: Cache Gradle Caches
        uses: gradle/actions/setup-gradle@v6

      - name: Run Gradle tasks
        run: ./gradlew preMerge --continue

      - name: Publish on Plugin Portal
        run: ./gradlew --project-dir plugin-build setupPluginUploadFromEnvironment publishPlugins
        if: success()
